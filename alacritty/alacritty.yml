window:
  opacity: 0.9

scrolling:
  history: 1000

font:
  normal:
    family: terminal-font
    style: Regular

  bold:
    family: terminal-font
    style: Bold

  italic: 
    family: terminal-font
    style: Italic

  size: 12

schemes:
  embark: &embark
    primary:
      background: '0x1e1c31'
      foreground: '0xcbe3e7'
    cursor:
      text: '0x1e1c31'
      cursor: '0xa1efd3'
    normal:
      black: '0x1e1c31'
      red: '0xf48fb1'
      green: '0xa1efd3'
      yellow: '0xffe6b3'
      blue: '0x91ddff'
      magenta: '0xd4bfff'
      cyan: '0x87dfeb'
      white: '0xcbe3e7'
    bright:
      black: '0x585273'
      red: '0xf02e6e'
      green: '0x62d196'
      yellow: '0xf2b482'
      blue: '0x65b2ff'
      magenta: '0xa37acc'
      cyan: '0x63f2f1'
      white: '0x8a889d'

  srcery: &srcery
    primary:
      background: '#1c1b19'
      foreground: '#fce8c3'

  # Cursor colors
    cursor:
      text: CellBackground
      cursor: '#fbb829'

  # Normal colors
    normal:
      black:   '#1c1b19'
      red:     '#ef2f27'
      green:   '#519f50'
      yellow:  '#fbb829'
      blue:    '#2c78bf'
      magenta: '#e02c6d'
      cyan:    '#0aaeb3'
      white:   '#baa67f'

  # Bright colors
    bright:
      black:   '#918175'
      red:     '#f75341'
      green:   '#98bc37'
      yellow:  '#fed06e'
      blue:    '#68a8e4'
      magenta: '#ff5c8f'
      cyan:    '#2be4d0'
      white:   '#fce8c3'

colors: *srcery
