shadow = false;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
frame-opacity = 0.7;

corner-radius = 30;

blur:
{
  method = "gaussian";
  size = 10;
  deviation = 5.0;
  strength = 5;
  kern = "3x3box";
};

blur-background = true;

backend = "xrender";
vsync = true;
detect-rounded-corners = true;

