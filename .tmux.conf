# my window manager config ;)
unbind C-b
unbind C-a
set -g prefix C-a

# form vim/tmux d/y buffer sync
set -g focus-events

bind-key C-a last-window

unbind |
bind | split-window -h
unbind -
bind - split-window -v

# vi for copy mode
setw -g mode-keys vi

# vi for command status
set -g status-keys vi

# vi keys to resize
bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# vi keys to select panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# avoid cursor movement messing with resize
set -g repeat-time 200

set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ',*-256color*:Tc'
set-option -ga terminal-overrides ',rxvt-unicode:Tc'
setw -g clock-mode-colour cyan
set -g base-index 1
setw -g pane-base-index 1

# nearly invisible pane borders
set -g pane-border-style "fg=#202020,bg=#202020"
set -g pane-active-border-style "fg=#202020,bg=#202020"

# window selection background
set -g mode-style "bg=black"

# reload config
bind -r r source-file ~/.tmux.conf

set -g message-style "fg=red"
set -g status off


